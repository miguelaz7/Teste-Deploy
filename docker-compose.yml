services:
  mysql:
    image: mysql:8
    container_name: tub_pgu_db
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: tub_pgu
      MYSQL_ROOT_PASSWORD: password
      MYSQL_USER: devuser
      MYSQL_PASSWORD: devpassword
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: