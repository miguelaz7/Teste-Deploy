version: '3.8'

services:
  db:
    image: mysql:8
    environment:
      MYSQL_DATABASE: tub_pgu
      MYSQL_USER: root
      MYSQL_PASSWORD: password
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: